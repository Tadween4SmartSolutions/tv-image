<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Image Uploader</title>
    <style>
        :root {
            --midnight: #1a1a2e;
            --terracotta: #e2725b;
            --sage: #8a9a5b;
            --bg-warm: #f4f1ea;
            --text-main: #2c2c2c;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-warm);
            color: var(--text-main);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: var(--midnight); font-weight: 300; letter-spacing: -1px; margin-bottom: 40px; }

        /* Warm Minimalist Upload Zone */
        #drop-zone {
            width: 80%;
            max-width: 800px;
            height: 200px;
            border: 2px dashed var(--terracotta);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 40px;
        }

        #drop-zone.dragover { background: #fff5f2; border-style: solid; transform: scale(1.02); }

        /* Image Grid */
        #gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
        }

        .image-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
            aspect-ratio: 16/9;
        }

        .image-card img { width: 100%; height: 100%; object-fit: cover; }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--terracotta);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 10px;
            cursor: pointer;
            opacity: 0.8;
        }

        .delete-btn:hover { opacity: 1; }

        /* Persistence Badge */
        .status-bar { font-size: 0.9rem; color: var(--sage); margin-top: 20px; font-weight: 600; }
    </style>
</head>
<body>

    <h1>TV Image Management</h1>

    <div id="drop-zone">
        <p>Drop images here or click to upload (JPG, PNG, WEBP)</p>
        <input type="file" id="file-input" multiple accept="image/*" style="display: none;">
    </div>

    <div id="gallery"></div>
    <div class="status-bar" id="status">System Ready</div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const gallery = document.getElementById('gallery');
        const status = document.getElementById('status');

        // Initial Load
        async function loadImages() {
            const res = await fetch('/api/images');
            const images = await res.json();
            gallery.innerHTML = images.map(img => `
                <div class="image-card">
                    <img src="${img.url}" alt="${img.originalName}">
                    <button class="delete-btn" onclick="deleteImage('${img.name}')">Delete</button>
                </div>
            `).join('');
            status.innerText = `Gallery Sync: ${images.length} images stored securely`;
        }

        // Upload Logic
        async function handleFiles(files) {
            const formData = new FormData();
            for (const file of files) formData.append('images', file);

            status.innerText = 'Uploading...';
            const res = await fetch('/upload', { method: 'POST', body: formData });
            const result = await res.json();
            
            if (result.success) {
                loadImages();
            } else {
                status.innerText = 'Upload failed';
                status.style.color = 'var(--terracotta)';
            }
        }

        // Delete Logic
        async function deleteImage(filename) {
            if (!confirm('Remove this image from the TV display?')) return;
            await fetch(`/api/images/${filename}`, { method: 'DELETE' });
            loadImages();
        }

        // Event Listeners
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        };

        loadImages();
    </script>
</body>
</html>
